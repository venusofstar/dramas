<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Munting Doctor</title>

<style>
:root {
  --main-red:#e50914;
}

body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}

/* HEADER */
header {
  background:var(--main-red);
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:10;
}

header button {
  position:absolute;
  left:10px;
  top:10px;
  font-size:16px;
}

/* LAYOUT */
.container {
  padding:15px;
  max-width:1200px;
  margin:auto;
}

/* VIDEO */
video {
  width:100%;
  max-height:75vh;
  border-radius:12px;
  margin-bottom:15px;
  background:black;
}

/* EPISODES GRID */
#episodes {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap:8px;
}

/* BUTTONS */
button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#333;
  color:#fff;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}

button:hover {
  background:var(--main-red);
}

button.active {
  background:var(--main-red);
  transform:scale(1.05);
}

/* 📱 PHONE */
@media (max-width:600px){
  button {
    font-size:12px;
    padding:8px;
  }

  video {
    max-height:50vh;
  }
}

/* 📲 TABLET */
@media (min-width:601px) and (max-width:1024px){
  #episodes {
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  }

  button {
    font-size:14px;
  }
}

/* 💻 DESKTOP */
@media (min-width:1025px){
  #episodes {
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  }

  button {
    font-size:15px;
  }
}

/* 📺 SMART TV (big screens) */
@media (min-width:1600px){
  body {
    font-size:20px;
  }

  button {
    padding:15px;
    font-size:18px;
  }

  video {
    max-height:80vh;
  }
}
</style>

<script>
let currentEpisode = 1;
const totalEpisodes = 60;
const baseURL = "https://maflix.qzz.io/drama/series/tagalog-dubbed/Inayos%20ng%20Munting%20Doctor%20Ang%20Pamilya/";

function playEpisode(ep){
  const player = document.getElementById("player");
  currentEpisode = ep;

  let normal = baseURL + "ep" + ep + ".mp4";
  let padded = baseURL + "ep" + (ep < 10 ? "0" + ep : ep) + ".mp4";

  player.src = normal;

  player.onerror = function(){
    player.src = padded;
    player.onerror = null;
  };

  player.play();
  highlightEpisode();
  scrollToActive();
}

function highlightEpisode(){
  const buttons = document.querySelectorAll("#episodes button");

  buttons.forEach(btn => btn.classList.remove("active"));

  if(buttons[currentEpisode - 1]){
    buttons[currentEpisode - 1].classList.add("active");
  }
}

/* 🔥 Auto scroll to current episode */
function scrollToActive(){
  const active = document.querySelector(".active");
  if(active){
    active.scrollIntoView({
      behavior:"smooth",
      block:"center"
    });
  }
}

window.onload = function(){
  const container = document.getElementById("episodes");
  const player = document.getElementById("player");

  for(let i = 1; i <= totalEpisodes; i++){
    const btn = document.createElement("button");
    btn.textContent = "Ep " + i;

    btn.onclick = function(){
      playEpisode(i);
    };

    container.appendChild(btn);
  }

  highlightEpisode();

  /* 🔥 Auto next */
  player.addEventListener("ended", function(){
    if(currentEpisode < totalEpisodes){
      playEpisode(currentEpisode + 1);
    }
  });
}
</script>

</head>
<body>

<header>
<button onclick="history.back()">⬅</button>
<h2>Inayos ng Munting Doctor Ang Pamilya</h2>
</header>

<div class="container">

<video id="player" controls
src="https://maflix.qzz.io/drama/series/tagalog-dubbed/Inayos%20ng%20Munting%20Doctor%20Ang%20Pamilya/ep1.mp4">
</video>

<div id="episodes"></div>

</div>

</body>
</html>
