<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Munting Doctor</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}

header {
  background:#e50914;
  padding:15px;
  text-align:center;
  position:relative;
}

header button {
  position:absolute;
  left:10px;
  top:10px;
}

.container {
  padding:15px;
  text-align:center;
}

video {
  width:100%;
  max-width:700px;
  border-radius:10px;
  margin-bottom:15px;
}

#episodes {
  max-width:700px;
  margin:auto;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

button {
  margin:5px;
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#333;
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  background:#e50914;
  transform:scale(1.05);
}
</style>

<script>
function playEpisode(ep){
  const player = document.getElementById("player");
  player.src = "https://maflix.qzz.io/drama/series/tagalog-dubbed/Inayos%20ng%20Munting%20Doctor%20Ang%20Pamilya/ep" + ep + ".mp4";
  player.play();
}

window.onload = function(){
  const container = document.getElementById("episodes");

  for(let i = 1; i <= 60; i++){
    const btn = document.createElement("button");
    btn.textContent = "Ep " + i;

    btn.onclick = function(){
      playEpisode(i);
    };

    container.appendChild(btn);
  }
}
</script>

</head>
<body>

<header>
<button onclick="history.back()">⬅ Back</button>
<h2>Inayos ng Munting Doctor Ang Pamilya</h2>
</header>

<div class="container">

<video id="player" controls
src="https://maflix.qzz.io/drama/series/tagalog-dubbed/Inayos%20ng%20Munting%20Doctor%20Ang%20Pamilya/ep1.mp4">
</video>

<div id="episodes"></div>

</div>

</body>
</html>
